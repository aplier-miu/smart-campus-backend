spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartcampus2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    show-sql: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

jwt:
  secret: "smartcampus-super-secret-key-must-be-very-long-1234567890"
  expiration: 86400000 # 24小时，毫秒

ai:
  mode: llm
  base-url: http://localhost:11434
  api-key: local
  model: qwen2.5:7b
  timeout-seconds: 120